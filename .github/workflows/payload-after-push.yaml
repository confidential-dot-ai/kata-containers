name: CI | Publish Kata Containers payload
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel a still-queued/running build when a newer commit lands, so a build
  # stuck waiting on a runner never wedges the slot and blocks the fix.
  cancel-in-progress: true

# NOTE (confidential-dot-ai fork): scoped to amd64 only. The IGVM measured-boot
# class (kata-qemu-snp-igvm) is x86_64-only, the org's self-hosted runner
# (the-machine) is x86_64, and the fork has no arm64/s390x/ppc64le runners — so
# those jobs only ever queue forever. Everything publishes to
# ghcr.io/confidential-dot-ai/* with GITHUB_TOKEN (no quay.io). To restore
# multi-arch, re-add the per-arch build/publish jobs (with real per-arch
# runners) and drop KATA_DEPLOY_ARCHES from the manifest jobs.

jobs:
  build-assets-amd64:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-kata-static-tarball-amd64.yaml
    with:
      commit-hash: ${{ github.sha }}
      push-to-registry: yes
      target-branch: ${{ github.ref_name }}
    secrets:
      QUAY_DEPLOYER_PASSWORD: ${{ secrets.QUAY_DEPLOYER_PASSWORD }}
      KBUILD_SIGN_PIN: ${{ secrets.KBUILD_SIGN_PIN }}

  publish-kata-deploy-image-amd64:
    needs: build-assets-amd64
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-kata-images.yaml
    with:
      commit-hash: ${{ github.sha }}
      registry: ghcr.io
      repo: confidential-dot-ai/kata-deploy-ci
      tag: kata-containers-latest-amd64
      target-branch: ${{ github.ref_name }}
      runner: ubuntu-22.04
      arch: amd64
      image-kind: deploy
    secrets:
      QUAY_DEPLOYER_PASSWORD: ${{ secrets.QUAY_DEPLOYER_PASSWORD }}

  publish-kata-monitor-image-amd64:
    needs: build-assets-amd64
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-kata-images.yaml
    with:
      commit-hash: ${{ github.sha }}
      registry: ghcr.io
      repo: confidential-dot-ai/kata-monitor-ci
      tag: kata-monitor-latest-amd64
      target-branch: ${{ github.ref_name }}
      runner: ubuntu-22.04
      arch: amd64
      image-kind: monitor
    secrets:
      QUAY_DEPLOYER_PASSWORD: ${{ secrets.QUAY_DEPLOYER_PASSWORD }}

  publish-manifest:
    name: publish-manifest
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    needs: [publish-kata-deploy-image-amd64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Login to GHCR (confidential-dot-ai fork)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch manifest
        run: |
          ./tools/packaging/release/release.sh publish-multiarch-manifest
        env:
          KATA_DEPLOY_IMAGE_TAGS: "kata-containers-latest"
          KATA_DEPLOY_REGISTRIES: "ghcr.io/confidential-dot-ai/kata-deploy-ci"
          KATA_DEPLOY_ARCHES: "amd64"

  publish-kata-monitor-manifest:
    name: publish-kata-monitor-manifest
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    needs: [publish-kata-monitor-image-amd64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Login to GHCR (confidential-dot-ai fork)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch monitor manifest
        run: |
          ./tools/packaging/release/release.sh publish-multiarch-manifest
        env:
          KATA_DEPLOY_IMAGE_TAGS: "kata-monitor-latest"
          KATA_DEPLOY_REGISTRIES: "ghcr.io/confidential-dot-ai/kata-monitor-ci"
          KATA_DEPLOY_PUBLISH_JOB_DISPATCHER: "false"
          KATA_DEPLOY_ARCHES: "amd64"

  upload-helm-chart-tarball:
    name: upload-helm-chart-tarball
    needs: publish-manifest
    runs-on: ubuntu-22.04
    permissions:
      packages: write # needed to push the helm chart to ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        id: install

      - name: Login to the OCI registries
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Push helm chart to the OCI registries
        run: |
          ./tools/packaging/kata-deploy/local-build/kata-deploy-build-and-upload-helm-chart.sh \
            ghcr.io/confidential-dot-ai/kata-deploy-ci \
            kata-containers-latest \
            ghcr.io/confidential-dot-ai/kata-deploy-charts \
            0.0.0-dev
